name: fitness_tracker
description: A professional advanced fitness tracking app
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.2

  # Local Database - SQLite
  sqflite: ^2.3.2
  path: ^1.9.0

  # Firebase
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.1.0
  google_sign_in: ^6.2.1

  # Charts
  fl_chart: ^0.68.0

  # UI & Animations
  smooth_page_indicator: ^1.1.0
  shimmer: ^3.0.0
  animate_do: ^3.3.4

  # Utils
  intl: ^0.19.0
  uuid: ^4.3.3
  shared_preferences: ^2.2.2

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true